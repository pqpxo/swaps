version: "3.9"

services:
  linuxprovisioner:
    build:
      context: .
      dockerfile: Dockerfile
    image: linuxprovisioner:2.0.0
    container_name: linuxprovisioner
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

